apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-elearning-config
  namespace: ai-elearning
data:
  DJANGO_DEBUG: "false"
  DJANGO_ALLOWED_HOSTS: "api.example.com"
  DB_HOST: "managed-postgres.example.com"
  DB_PORT: "5432"
  DB_NAME: "elearning"
  DB_USER: "elearning"
  REDIS_URL: "redis://redis:6379/0"
  S3_ENDPOINT: "https://s3.example.com"
  S3_BUCKET: "elearning-assets"
  NEXT_PUBLIC_API_BASE_URL: "https://api.example.com/api"
  NEXT_PUBLIC_SOCKET_URL: "https://api.example.com"
