apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ai-elearning
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/example/ai-elearning-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ai-elearning-config
            - secretRef:
                name: ai-elearning-secrets
          readinessProbe:
            httpGet:
              path: /api/auth/token/
              port: 8000
            initialDelaySeconds: 15
          livenessProbe:
            httpGet:
              path: /api/auth/token/
              port: 8000
            initialDelaySeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: ai-elearning
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
