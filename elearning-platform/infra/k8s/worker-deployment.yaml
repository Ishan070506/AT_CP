apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: ai-elearning
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/example/ai-elearning-backend:latest
          command: ["python", "manage.py", "rqworker", "monitoring", "notifications"]
          envFrom:
            - configMapRef:
                name: ai-elearning-config
            - secretRef:
                name: ai-elearning-secrets
