apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: ai-elearning
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ghcr.io/example/ai-elearning-web:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: ai-elearning-config
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: ai-elearning
spec:
  selector:
    app: web
  ports:
    - name: http
      port: 80
      targetPort: 3001
